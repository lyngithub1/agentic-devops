name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly, Monday 03:27 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload code-scanning results
      contents: read
      actions: read # required to scan the `actions` language
    strategy:
      fail-fast: false
      matrix:
        # Scans application source AND the GitHub Actions workflows themselves.
        # NOTE: CodeQL code scanning is free on PUBLIC repos. On a private repo
        # it requires GitHub Advanced Security.
        language: [javascript-typescript, actions]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
